name: Build iOS Dynamic Library

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build PoolHelperMenu.dylib
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          mkdir -p build
          clang -arch arm64 \
                -isysroot "$SDK" \
                -miphoneos-version-min=14.0 \
                -framework UIKit \
                -framework Foundation \
                -framework CoreGraphics \
                -framework QuartzCore \
                -dynamiclib \
                -fobjc-arc \
                -install_name @rpath/PoolHelperMenu.dylib \
                -O2 \
                -o build/PoolHelperMenu.dylib \
                src/PoolHelperMenu.m
          echo "Built successfully:"
          ls -lh build/PoolHelperMenu.dylib

      - name: Upload PoolHelperMenu.dylib
        uses: actions/upload-artifact@v4
        with:
          name: PoolHelperMenu-dylib
          path: build/PoolHelperMenu.dylib
          if-no-files-found: error
