name: Build iOS Dynamic Libraries

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Get SDK path
        run: xcrun --sdk iphoneos --show-sdk-path

      - name: Build PoolHelperMenu.dylib
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          mkdir -p build
          clang -arch arm64 \
                -isysroot "$SDK" \
                -miphoneos-version-min=14.0 \
                -framework UIKit \
                -framework Foundation \
                -framework QuartzCore \
                -dynamiclib \
                -fobjc-arc \
                -install_name @rpath/PoolHelperMenu.dylib \
                -O2 \
                -o build/PoolHelperMenu.dylib \
                src/PoolHelperMenu.m
          echo "Built: build/PoolHelperMenu.dylib"

      - name: Build FloatingMenu.dylib
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          mkdir -p build
          clang -arch arm64 \
                -isysroot "$SDK" \
                -miphoneos-version-min=14.0 \
                -framework UIKit \
                -framework Foundation \
                -dynamiclib \
                -fobjc-arc \
                -install_name @rpath/FloatingMenu.dylib \
                -O2 \
                -o build/FloatingMenu.dylib \
                src/FloatingMenu.m
          echo "Built: build/FloatingMenu.dylib"

      - name: Upload PoolHelperMenu.dylib
        uses: actions/upload-artifact@v4
        with:
          name: PoolHelperMenu-dylib
          path: build/PoolHelperMenu.dylib
          if-no-files-found: error

      - name: Upload FloatingMenu.dylib
        uses: actions/upload-artifact@v4
        with:
          name: FloatingMenu-dylib
          path: build/FloatingMenu.dylib
          if-no-files-found: error
